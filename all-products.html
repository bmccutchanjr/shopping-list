<!DOCTYPE html>
<html lang="en-us">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">
    <title>Shopping List</title>

    <link href="css/master.css" rel="stylesheet" type="text/css">
    <link href="css/all-products.css" rel="stylesheet" type="text/css">
</head>

<body>
    <div class="wrapper">
        <header class="header">
            <span id="countElements">00</span> items are on the list in <span id="countCategories">00</span> categories<br>
            <span id="countShopList">00</span> items are on the shopping list</span>
            <menu>
                <menu-item class=menu-item id="m-item-0">▼ Options</menu-item>
                <menu-item class=menu-item id="m-item-1">Go to Shopping List</menu-item>
                <menu-item class=modal-option
                           expanded = false
                           id="m-item-2"
                           onclick="expandAll(event);">Expand All</menu-item>
            </menu>
        </header>
        <form id=form>
            <input class=prod-name
                   name=prod-name
                   id=prod-name
                   label="Name of the item"
                   onfocus="focusHandler(event)"
                   placeholder="The name of the product">
            <br>
            <br>
            <input class=prod-loc
                   name=prod-loc
                   id=prod-loc
                   label="Shopping category"
                   onfocus="focusHandler(event)"
                   placeholder="Where the product is located in the store">
            <br>
            <br>
            <div class=form-div>
                Planned quantity: <input class=plan-qty
                                         name=plan-qty
                                         id=plan-qty
                                         label="The quantity you intend to purchase"
                                         onfocus="focusHandler(event)"
                                         placeholder=1>
            </div>
            <br>
            <div class=form-div>
                Planned price: <input class=plan-price
                                      name=plan-price
                                      id=plan-price
                                      label="The expected price of the item"
                                      onfocus="focusHandler(event)"
                                      placeholder=1.00>
            </div>
            <br>
            <input class=prod-desc
                   name=prod-desc
                   id=prod-desc
                   label="A description of the product"
                   onfocus="focusHandler(event)"
                   placeholder="A more detailed description of the product">
            <br>
            <br>
            <a href="#"
               class="modal-option"
               onclick="formSave (event);">SAVE</a>
            <a href="#"
               class="modal-option"
               onclick="formReset (event)">RESET</a>
            <a href="#"
               class="modal-option"
               onclick="formCancel (event)">CANCEL</a>
            <input name=hide-name hidden>
            <input name=hide-loc hidden>
            <input name=hide-qty hidden>
            <input name=hide-price hidden>
            <input name=hide-desc hidden>
            <input name=hide-uID hidden>
        </form>
        <main id="main"></main>
        <div class="push"></div>
    </div>
    <footer>Shopping List: Product Maintenance (All Rights Reserved)</footer>
</body>

<script language="JavaScript" src="javascript/menu.js"></script>
<script language="JavaScript" src="javascript/common.js"></script>
<script language="JavaScript" src="javascript/all-products.js"></script>
<script language="JavaScript" src="data/IndexedDB.js"></script>
</html>
